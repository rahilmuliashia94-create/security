<!DOCTYPE html>

<html>
<head>
<title>Products</title>

<style>

body{
font-family:Inter;
margin:0;
background:#f7f9fb;
}

.section{
padding:70px 20px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.card img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="section">

<h1>Products</h1>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<h3>4K Bullet Camera</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1555617117-08fda6edc6d0">
<h3>Dome Camera</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
<h3>Network Video Recorder</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1581091215367-59ab6b0d0c82">
<h3>Presence Sensor</h3>
</div>

</div>

</div>

</body>
</html>
