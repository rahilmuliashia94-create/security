<!DOCTYPE html>

<html>
<head>
<title>Solutions</title>

<style>

body{
font-family:Inter;
margin:0;
background:#f7f9fb;
}

.section{
padding:70px 20px;
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="section">

<h1>Security Solutions</h1>

<div class="grid">

<div class="card">
<h3>Video Surveillance</h3>
<p>AI cameras and monitoring systems.</p>
</div>

<div class="card">
<h3>Access Control</h3>
<p>Biometric and card access systems.</p>
</div>

<div class="card">
<h3>Smart Parking</h3>
<p>License plate recognition and parking guidance.</p>
</div>

<div class="card">
<h3>IoT Sensors</h3>
<p>Environmental monitoring and presence detection.</p>
</div>

</div>

</div>

</body>
</html>
